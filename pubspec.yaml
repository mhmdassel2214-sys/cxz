name: firstapp
description: "مكانك الافضل للمشاهدة "
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.11.1

dependencies:
  audioplayers: ^5.2.1
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  video_player: ^2.8.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.0.5
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.4
  firebase_analytics: ^12.1.3
  package_info_plus: ^8.0.0   # 👈 هذا المهم
  background_downloader: ^9.5.4
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1


flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

